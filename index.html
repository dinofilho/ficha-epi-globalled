<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ficha Digital de EPI | GLOBALLED SST</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#061f21;color:white;padding:18px}
.container{max-width:900px;margin:auto;background:#0b2d30;padding:22px;border-radius:22px;box-shadow:0 0 25px rgba(0,255,180,.25)}
.logo{display:block;margin:0 auto 15px;max-width:130px;border-radius:18px}
h1{text-align:center;color:#00ffae}
label{font-weight:bold;margin-top:12px;display:block}
input,textarea{width:100%;padding:14px;margin-top:7px;border:1px solid #146b65;border-radius:12px;background:#103c3f;color:white;font-size:16px;box-sizing:border-box}
textarea{min-height:120px}
button{width:100%;padding:16px;margin-top:15px;border:none;border-radius:12px;background:#009b68;color:white;font-size:17px;font-weight:bold}
.btn2{background:#004aad}.btn3{background:#8b0000}
.card{background:#082426;border:1px solid #146b65;border-radius:18px;padding:16px;margin-top:18px}
canvas{background:white;border-radius:12px;width:100%;height:160px}
.epi{border:1px solid #146b65;padding:12px;border-radius:12px;margin-top:10px}
.pdf{background:white;color:#111;padding:25px;border-radius:12px}
.pdf h1,.pdf h2{color:#004d40}
.small{font-size:12px;color:#333}
</style>
</head>
<body>

<div class="container">
<img class="logo" src="https://globalledsst.com.br/img/logo.png">
<h1>FICHA DIGITAL DE ENTREGA DE EPI</h1>
<p style="text-align:center">Registro digital de entrega, ciência, responsabilidade e assinatura.</p>

<div class="card">
<label>Empresa</label><input id="empresa" placeholder="Nome da empresa">
<label>CNPJ</label><input id="cnpj" placeholder="CNPJ">
<label>Colaborador</label><input id="colaborador" placeholder="Nome completo">
<label>CPF</label><input id="cpf" placeholder="CPF">
<label>Função</label><input id="funcao" placeholder="Função">
<label>Setor</label><input id="setor" placeholder="Setor">
</div>

<div class="card">
<h2>EPIs Entregues</h2>
<div id="epis"></div>
<button onclick="addEPI()">+ ADICIONAR EPI</button>
</div>

<div class="card">
<h2>Termo de Responsabilidade</h2>
<textarea id="termo">Declaro ter recebido os Equipamentos de Proteção Individual relacionados nesta ficha, em perfeito estado de conservação e funcionamento, comprometendo-me a utilizá-los corretamente durante a execução das atividades, zelar pela sua guarda e conservação, comunicar qualquer dano, perda ou irregularidade, e seguir as orientações de segurança fornecidas pela empresa.</textarea>
</div>

<div class="card">
<h2>Assinatura do colaborador</h2>
<canvas id="assColab"></canvas>
<button class="btn3" onclick="limpar('assColab')">LIMPAR ASSINATURA</button>
</div>

<div class="card">
<h2>Assinatura do responsável</h2>
<canvas id="assResp"></canvas>
<button class="btn3" onclick="limpar('assResp')">LIMPAR ASSINATURA</button>
</div>

<button onclick="gerarPDF()">GERAR PDF DA FICHA DE EPI</button>
<button class="btn2" onclick="enviarWhatsApp()">ENVIAR RESUMO PELO WHATSAPP</button>

<div id="areaPDF" style="display:none"></div>
</div>

<script>
let total=0;
function addEPI(){
total++;
let div=document.createElement("div");
div.className="epi";
div.innerHTML=`
<label>EPI ${total}</label><input class="nomeEPI" placeholder="Ex: Capacete, luva, óculos">
<label>Fabricante</label><input class="fabricante" placeholder="Fabricante">
<label>CA</label><input class="ca" placeholder="Certificado de Aprovação">
<label>Quantidade</label><input class="qtd" placeholder="Quantidade">
<label>Data de entrega</label><input class="dataEntrega" type="date">
`;
document.getElementById("epis").appendChild(div);
}
addEPI();

function prepararCanvas(id){
const c=document.getElementById(id), ctx=c.getContext("2d");
function resize(){c.width=c.offsetWidth;c.height=160}
resize(); window.addEventListener("resize",resize);
let draw=false;
function pos(e){let r=c.getBoundingClientRect();return{x:(e.touches?e.touches[0].clientX:e.clientX)-r.left,y:(e.touches?e.touches[0].clientY:e.clientY)-r.top}}
c.onmousedown=c.ontouchstart=e=>{draw=true;let p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);e.preventDefault()}
c.onmousemove=c.ontouchmove=e=>{if(!draw)return;let p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();e.preventDefault()}
c.onmouseup=c.onmouseleave=c.ontouchend=()=>draw=false;
}
prepararCanvas("assColab"); prepararCanvas("assResp");
function limpar(id){let c=document.getElementById(id);c.getContext("2d").clearRect(0,0,c.width,c.height)}

async function gerarPDF(){
const {jsPDF}=window.jspdf;
let epis=document.querySelectorAll(".epi");
let linhas="";
epis.forEach((e,i)=>{
linhas+=`<tr>
<td>${i+1}</td>
<td>${e.querySelector(".nomeEPI").value}</td>
<td>${e.querySelector(".fabricante").value}</td>
<td>${e.querySelector(".ca").value}</td>
<td>${e.querySelector(".qtd").value}</td>
<td>${e.querySelector(".dataEntrega").value}</td>
</tr>`;
});

let hoje=new Date().toLocaleString("pt-BR");
let ass1=document.getElementById("assColab").toDataURL();
let ass2=document.getElementById("assResp").toDataURL();

areaPDF.style.display="block";
areaPDF.innerHTML=`
<div class="pdf" id="pdfFinal">
<h1>FICHA DE ENTREGA DE EPI - GLOBALLED SST</h1>
<p><b>Data de geração:</b> ${hoje}</p>
<p><b>Empresa:</b> ${empresa.value}</p>
<p><b>CNPJ:</b> ${cnpj.value}</p>
<p><b>Colaborador:</b> ${colaborador.value}</p>
<p><b>CPF:</b> ${cpf.value}</p>
<p><b>Função:</b> ${funcao.value}</p>
<p><b>Setor:</b> ${setor.value}</p>

<h2>EPIs Entregues</h2>
<table border="1" width="100%" cellspacing="0" cellpadding="6">
<tr><th>Nº</th><th>EPI</th><th>Fabricante</th><th>CA</th><th>Qtd</th><th>Data</th></tr>
${linhas}
</table>

<h2>Termo de Responsabilidade</h2>
<p>${termo.value}</p>

<h2>Assinaturas</h2>
<p><b>Colaborador:</b></p>
<img src="${ass1}" style="width:320px;border:1px solid #ccc">
<p><b>Responsável:</b></p>
<img src="${ass2}" style="width:320px;border:1px solid #ccc">

<p class="small">Documento gerado digitalmente pelo sistema Ficha EPI Digital GLOBALLED SST.</p>
</div>`;

let el=document.getElementById("pdfFinal");
let canvasPDF=await html2canvas(el,{scale:2});
let img=canvasPDF.toDataURL("image/png");
let pdf=new jsPDF("p","mm","a4");
let largura=210;
let altura=canvasPDF.height*largura/canvasPDF.width;
pdf.addImage(img,"PNG",0,0,largura,altura);
pdf.save("Ficha-EPI-Globalled.pdf");
}

function enviarWhatsApp(){
let msg=`FICHA DIGITAL DE EPI GLOBALLED SST%0A%0AEmpresa: ${empresa.value}%0AColaborador: ${colaborador.value}%0AFunção: ${funcao.value}%0ASetor: ${setor.value}%0AData: ${new Date().toLocaleString("pt-BR")}%0A%0ARegistro criado pelo sistema Ficha EPI Digital.`;
window.open(`https://wa.me/551433224141?text=${msg}`,"_blank");
}
</script>

</body>
</html>
